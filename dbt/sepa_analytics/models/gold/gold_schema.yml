version: 2

models:
  - name: gold_price_timeseries
    description: >
      Pre-aggregated daily price series by product and province. Designed for
      time series analysis: monthly inflation (IPC), seasonal decomposition,
      ADF stationarity testing, and SEPA vs INDEC comparison. Products are
      cleaned (DISC: prefix stripped) and categorized into ~15 IPC-relevant groups.
      Grain: (fecha_vigencia, id_producto, provincia).
    columns:
      - name: fecha_vigencia
        description: "Business date of the price snapshot. Partition key."
        tests:
          - not_null
      - name: id_producto
        description: "Product identifier."
        tests:
          - not_null
      - name: descripcion_clean
        description: "Product description with DISC:/HVDC prefixes stripped."
      - name: marca
        description: "Product brand. ~7.8% NULL upstream."
      - name: categoria_inferida
        description: "Category inferred from keyword matching (dbt macro). Used for IPC grouping."
        tests:
          - not_null
      - name: provincia
        description: "Argentine province code (e.g., AR-B, AR-C). NULL rows excluded."
        tests:
          - not_null
      - name: precio_promedio
        description: "Mean precio_lista across stores in this province for this product."
        tests:
          - not_null
      - name: precio_mediana
        description: "Median precio_lista -- more robust to outliers than mean."
      - name: precio_min
        description: "Minimum observed precio_lista (cheapest store)."
      - name: precio_max
        description: "Maximum observed precio_lista (most expensive store)."
      - name: precio_desvio
        description: "Standard deviation of precio_lista. Proxy for price dispersion."
      - name: num_observaciones
        description: "Total price records contributing to this aggregation."
      - name: num_sucursales
        description: "Distinct store branches reporting this product in this province."

  - name: gold_cross_price_elasticity
    description: >
      Paired chain prices for the same product on the same date. Used for
      cross-price elasticity estimation via log-log OLS regression. Each row
      represents a unique chain pair (cadena_a < cadena_b, no duplicates).
      Pre-computed LN(precio) columns for direct regression use. Only includes
      pairs where both chains have >= 3 store-level observations.
      Grain: (fecha_vigencia, id_producto, cadena_a, cadena_b).
    columns:
      - name: fecha_vigencia
        description: "Business date."
        tests:
          - not_null
      - name: id_producto
        description: "Product identifier."
        tests:
          - not_null
      - name: descripcion_clean
        description: "Cleaned product description."
      - name: marca
        description: "Product brand."
      - name: categoria_inferida
        description: "Inferred product category."
      - name: cadena_a
        description: "First chain in the comparison pair (alphabetical order)."
        tests:
          - not_null
      - name: cadena_b
        description: "Second chain in the comparison pair."
        tests:
          - not_null
      - name: precio_promedio_a
        description: "Average price at cadena_a for this product on this date."
      - name: precio_promedio_b
        description: "Average price at cadena_b for this product on this date."
      - name: ln_precio_a
        description: "Natural log of precio_promedio_a. Direct input for log-log regression."
      - name: ln_precio_b
        description: "Natural log of precio_promedio_b. Direct input for log-log regression."
      - name: num_obs_a
        description: "Store-level observation count for cadena_a (>= 3 guaranteed)."
      - name: num_obs_b
        description: "Store-level observation count for cadena_b (>= 3 guaranteed)."
      - name: diferencia_pct
        description: "Percentage price difference: (B - A) / A * 100."

  - name: gold_price_hypothesis
    description: >
      Denormalized flat table at store-level granularity with all relevant
      dimensions. Designed for hypothesis testing: t-test (CABA vs Cordoba),
      ANOVA (across chains), Mann-Whitney U, Chi-squared. Each row is one
      price observation from one store, enriched with chain name, province,
      category, and promotion status.
      Grain: (fecha_vigencia, id_producto, id_sucursal).
    columns:
      - name: fecha_vigencia
        description: "Business date."
        tests:
          - not_null
      - name: id_producto
        description: "Product identifier."
        tests:
          - not_null
      - name: id_sucursal
        description: "Store branch identifier."
        tests:
          - not_null
      - name: descripcion_clean
        description: "Cleaned product description."
      - name: marca
        description: "Product brand."
      - name: categoria_inferida
        description: "Inferred product category."
      - name: bandera_nombre
        description: "Chain/banner name (e.g., Carrefour, Coto, Disco)."
      - name: provincia
        description: "Province code. NULL rows excluded (required for regional tests)."
        tests:
          - not_null
      - name: localidad
        description: "City/locality within the province."
      - name: precio_lista
        description: "Listed retail price (filtered >= 10.0 ARS)."
        tests:
          - not_null
      - name: tiene_promo
        description: "TRUE if any promotional price exists for this product at this store."
      - name: precio_efectivo
        description: "Effective price the consumer pays: COALESCE(promo_price, list_price)."
