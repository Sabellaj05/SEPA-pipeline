
name: 'sepa_analytics'
version: '1.0.0'

profile: 'sepa_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Limits the initial full scan on BigQuery. Override with:
  # --vars '{"start_date": "2024-01-01"}' to go back further.
  start_date: '2025-01-01'

models:
  sepa_analytics:
    staging:
      +materialized: view
    intermediate:
      +materialized: table
    marts:
      +materialized: table
    gold:
      +materialized: incremental

